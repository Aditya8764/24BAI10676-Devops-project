define host {
    use                     linux-server
    host_name               college-event-web
    alias                   College Event Web Application
    address                 college_event_web-college-event-web-1
}

define service {
    use                     generic-service
    host_name               college-event-web
    service_description     HTTP Health Check
    check_command           check_http!-p 8084 -u /actuator/health
}
