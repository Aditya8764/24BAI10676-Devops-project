apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-website-deployment
  labels:
    app: event-website
spec:
  replicas: 3 # Ensures High Availability
  selector:
    matchLabels:
      app: event-website
  template:
    metadata:
      labels:
        app: event-website
    spec:
      containers:
      - name: event-website
        image: yourdockerhubusername/event-website:latest # Replace with your Docker Hub username
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"