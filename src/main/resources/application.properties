spring.application.name=college_event_web
server.port=8084

# Official Spring Boot Actuator settings for Graphite
management.metrics.export.graphite.host=graphite
management.metrics.export.graphite.port=2004
management.metrics.export.graphite.enabled=true

# How often to push metrics (e.g., every 1 minute)
management.metrics.export.graphite.step=1m

# Tag the metrics so you can find them in Grafana
management.metrics.tags.application=TechSympApp